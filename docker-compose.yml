name: kcw_ops

services:
  db:
    image: postgres:16
    container_name: kcw_ops
    environment:
      POSTGRES_DB: kcw_ops
      POSTGRES_USER: kcw_ops
      POSTGRES_PASSWORD: kcw_local
    ports:
      - "5435:5432"
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcw_ops -d kcw_ops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data:
